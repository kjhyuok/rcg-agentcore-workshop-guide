site_name: "Build! Deploy! Observe! 리테일 Agent 실전 구축하기"
site_description: "From PoC to Production: Strands Agents + AgentCore Hands-On"
site_url: ""

theme:
  name: material
  language: ko
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/git-alt

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - 시작하기 전에: setup.md
  - "Phase 1: 첫 Agent, 세상에 내보내기":
    - 개요: phase1/index.md
    - "Agent에게 도구를 쥐어주자": phase1/step1-gateway.md
    - "똑똑한 두뇌를 달아주자": phase1/step2-agent.md
    - "세상에 공개하기": phase1/step3-runtime.md
    - "Agent의 생각을 들여다보기": phase1/step4-observability.md
  - "Phase 2A: 어제 온 고객을 기억하는 CS Agent":
    - 개요: phase2a/index.md
    - "고객을 기억하게 만들자": phase2a/step1-memory.md
    - "경쟁사 가격도 조회하게 하자": phase2a/step2-gateway.md
    - "맥락을 이해하는 Agent 완성": phase2a/step3-agent.md
    - "규칙을 지키게 하자": phase2a/step4-policy.md
  - "Phase 2B: 뉴스와 날씨를 수집하는 Agent":
    - 개요: phase2b/index.md
    - "데이터 재료 준비하기": phase2b/step1-gateway.md
    - "나만의 수집 Agent 만들어 배포하기": phase2b/step2-agent.md
  - "Phase 3: 바이브코딩으로 나만의 Agent 만들기":
    - 개요: phase3/index.md
    - "나만의 Agent 설계하기": phase3/step1-design.md
    - "바이브코딩으로 구현하기": phase3/step2-vibecoding.md
    - "Runtime 배포 & Playground 테스트": phase3/step3-deploy.md
    - "Memory로 고도화하기": phase3/step4-memory.md
  - 부록:
    - "AgentCore 서비스 한눈에 보기": appendix/service-map.md
    - "우리 회사에서 이어가기": appendix/next-steps.md
    - "FAQ & 트러블슈팅": appendix/faq.md
